            git clone "ssh://aur@aur.archlinux.org/msty-claw.git" /tmp/msty-claw-aur
            rsync -a --delete --exclude=".git" msty-claw/ /tmp/msty-claw-aur/
            cd /tmp/msty-claw-aur
