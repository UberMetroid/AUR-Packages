          sudo -u builduser bash -c '
            git config --global user.name "UberMetroid"
            git config --global user.email "jerydleuck@gmail.com"
            git clone "ssh://aur@aur.archlinux.org/msty-studio.git" /tmp/msty-studio-aur
            rsync -a --delete --exclude=".git" msty-studio/ /tmp/msty-studio-aur/
            cd /tmp/msty-studio-aur
